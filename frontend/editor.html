<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PaperPilot Editor — Professional inline research document editor with live preview and multiple export formats.">
    <title>PaperPilot — Document Editor</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="editor.css">
</head>
<body class="editor-body">

    <!-- ═══════════ EDITOR NAV ═══════════ -->
    <nav class="editor-nav" id="editor-nav">
        <div class="editor-nav-left">
            <a href="/" class="editor-nav-back" id="editor-back" aria-label="Back to research">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
                <span class="editor-back-text">← Research</span>
            </a>
        </div>

        <div class="editor-nav-center">
            <select class="template-select" id="template-select" title="Document template">
                <option value="ieee">IEEE Conference</option>
                <option value="apa">APA Research</option>
                <option value="litreview" selected>Literature Review</option>
                <option value="executive">Executive Brief</option>
            </select>
        </div>

        <div class="editor-nav-right">
            <button class="editor-btn editor-btn-outline" id="btn-export-md" title="Export as Markdown">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
                <span>Markdown</span>
            </button>
            <button class="editor-btn editor-btn-primary" id="btn-export-pdf" title="Export as PDF">
                <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>
                <span>Export PDF</span>
            </button>
        </div>
    </nav>

    <!-- ═══════════ EDITOR LAYOUT ═══════════ -->
    <main class="editor-main" id="editor-main">
        <!-- Left Pane: Code Editor -->
        <div class="editor-pane editor-pane-left" id="editor-pane-left">
            <div class="pane-header">
                <span class="pane-header-label">Editor</span>
                <div class="pane-header-actions">
                    <span class="save-status" id="save-status"></span>
                    <span class="word-count" id="word-count">0 words</span>
                </div>
            </div>
            <textarea class="editor-textarea" id="editor-textarea" spellcheck="false" placeholder="Start writing your research document here...

# Your Title

## Abstract
Write your abstract here...

## Introduction
Begin your introduction...
"></textarea>
        </div>

        <!-- Drag Handle -->
        <div class="editor-divider" id="editor-divider">
            <div class="editor-divider-line"></div>
        </div>

        <!-- Right Pane: Live Preview -->
        <div class="editor-pane editor-pane-right" id="editor-pane-right">
            <div class="pane-header">
                <span class="pane-header-label">Preview</span>
                <div class="pane-header-actions">
                    <button class="pane-btn" id="btn-sync-scroll" title="Sync scroll position between editor and preview">Sync</button>
                </div>
            </div>
            <div class="editor-preview" id="editor-preview">
                <div class="preview-empty">
                    <p>Start typing in the editor to see a live preview here.</p>
                </div>
            </div>
        </div>
    </main>

    <!-- Toast Container -->
    <div class="toast-container" id="toast-container"></div>

    <script src="editor.js"></script>
</body>
</html>
